name: Build 4phone for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows.yml"
      - "build/**"
      - "installer/**"
      - "microsip/**"
      - "vcpkg.json"

permissions:
  contents: read

concurrency:
  group: build-4phone-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-win32:
    name: Release Win32
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Cache pinned dependencies
        uses: actions/cache@v4
        with:
          path: |
            _deps/pjproject
            _deps/vcpkg
            _deps/vcpkg_installed
          key: 4phone-win32-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'build/**') }}

      - name: Validate generated brand assets
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check Pillow==11.3.0
          python .\build\generate-brand-assets.py --check

      - name: Validate language packs
        shell: pwsh
        run: python .\build\validate-langpacks.py

      - name: Validate XML compatibility
        shell: pwsh
        run: python .\build\test-xml-compat.py

      - name: Build 4phone
        shell: pwsh
        run: .\build\build-windows.ps1

      - name: Ensure Inno Setup
        shell: pwsh
        run: |
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 7\ISCC.exe",
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 7\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          )
          if (-not ($candidates | Where-Object { Test-Path $_ } | Select-Object -First 1)) {
            choco install innosetup -y --no-progress
            if ($LASTEXITCODE -ne 0) {
              throw "Не удалось установить Inno Setup"
            }
          }

      - name: Build installer
        shell: pwsh
        run: .\build\build-installer.ps1

      - name: Create portable SHA-256 checksum
        shell: pwsh
        run: |
          $exe = "microsip\Release\4phone.exe"
          $hash = (Get-FileHash -Algorithm SHA256 $exe).Hash.ToLowerInvariant()
          [System.IO.File]::WriteAllText(
            "$exe.sha256",
            "$hash  4phone.exe`n",
            [System.Text.Encoding]::ASCII)

      - name: Upload installer and portable files
        uses: actions/upload-artifact@v4
        with:
          name: 4phone-win32-${{ github.run_number }}
          path: |
            microsip/Release/4phone-setup.exe
            microsip/Release/4phone-setup.exe.sha256
            microsip/Release/4phone.exe
            microsip/Release/4phone.exe.sha256
            microsip/Release/WinSparkle.dll
            microsip/Release/langpack_russian.txt
            microsip/Release/langpack_uzbek.txt
          if-no-files-found: error
          retention-days: 30
